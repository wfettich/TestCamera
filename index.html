<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Camera Stream — Relay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 { margin-bottom: 20px; font-weight: 300; }
        #video-container {
            width: 90vw;
            max-width: 1280px;
            max-height: 70vh;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: contain; display: block; background: #000; }
        #status-bar {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #status { color: #888; font-size: 14px; }
        #state-pill {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: #333;
            color: #aaa;
        }
        #state-pill.connecting { background: #664400; color: #ffaa44; }
        #state-pill.connected  { background: #004422; color: #44cc88; }
        #state-pill.failed     { background: #440022; color: #ff6688; }
        #retry-btn, #download-log-btn {
            margin-top: 16px;
            padding: 8px 24px;
            border: none;
            border-radius: 8px;
            background: #0a84ff;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            display: none;
        }
        #download-log-btn {
            background: #333;
            color: #ccc;
            margin-left: 8px;
        }
        #camera-id-error {
            margin-top: 32px;
            padding: 16px 24px;
            background: #440022;
            border-radius: 8px;
            color: #ff6688;
            font-size: 15px;
            display: none;
        }
        #debug {
            margin-top: 16px;
            width: 90vw;
            max-width: 1280px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 12px;
            line-height: 1.4;
            background: #111;
            border-radius: 8px;
            padding: 12px 16px;
            color: #ccc;
        }
        #debug .row { display: flex; gap: 16px; flex-wrap: wrap; }
        #debug .row + .row { margin-top: 6px; }
        #debug .label { color: #888; min-width: 90px; }
        #debug .value { color: #fff; }
        #debug .value.warn { color: #ffaa44; }
        #debug .value.ok  { color: #44cc88; }
        #debug .value.err { color: #ff6688; }
        #debug-log {
            margin-top: 8px;
            max-height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #999;
        }
    </style>
</head>
<body>
    <h1>Camera Stream</h1>
    <div id="video-container">
        <video id="video" autoplay muted playsinline></video>
    </div>
    <div id="status-bar">
        <span id="state-pill" class="connecting">connecting</span>
        <span id="status">Starting WebRTC...</span>
    </div>
    <button id="retry-btn" onclick="connect(0)">Retry</button>
    <button id="download-log-btn" onclick="downloadLog()">Download log</button>
    <div id="camera-id-error">Missing camera ID. Use the URL with <code>?cameraId=&lt;id&gt;</code> from the camera app.</div>

    <div id="debug">
        <div class="row">
            <div><span class="label">PC state:</span><span class="value" id="dbg-pc">-</span></div>
            <div><span class="label">ICE state:</span><span class="value" id="dbg-ice">-</span></div>
            <div><span class="label">Sig state:</span><span class="value" id="dbg-sig">-</span></div>
        </div>
        <div class="row">
            <div><span class="label">Video track:</span><span class="value" id="dbg-track">none</span></div>
            <div><span class="label">Bytes rcvd:</span><span class="value" id="dbg-bytes">0</span></div>
            <div><span class="label">Pkts rcvd:</span><span class="value" id="dbg-pkts">0</span></div>
        </div>
        <div id="debug-log"></div>
    </div>

    <script>
    (function() {
        const video   = document.getElementById('video');
        const status  = document.getElementById('status');
        const pill    = document.getElementById('state-pill');
        const retryBtn = document.getElementById('retry-btn');
        const cameraIdErr = document.getElementById('camera-id-error');
        const MAX_RETRIES = 3;
        var debugLogLines = [];

        const dbg = {
            pc:   document.getElementById('dbg-pc'),
            ice:  document.getElementById('dbg-ice'),
            sig:  document.getElementById('dbg-sig'),
            track: document.getElementById('dbg-track'),
            bytes: document.getElementById('dbg-bytes'),
            pkts:  document.getElementById('dbg-pkts'),
            log:   document.getElementById('debug-log')
        };

        function logDebug(msg) {
            var t = new Date().toLocaleTimeString();
            var line = '[' + t + '] ' + msg;
            console.log(line);
            debugLogLines.push(line);
            if (dbg.log) {
                dbg.log.textContent = line + '\n' + dbg.log.textContent;
                if (dbg.log.textContent.length > 4000) {
                    dbg.log.textContent = dbg.log.textContent.slice(0, 4000);
                }
            }
        }

        function downloadLog() {
            var text = debugLogLines.join('\n');
            var blob = new Blob([text], { type: 'text/plain' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'viewer-debug-' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function autoDownloadLog(reason) {
            logDebug('AUTO-DOWNLOAD triggered: ' + reason);
            setTimeout(downloadLog, 500);
        }

        window.onerror = function(msg, url, line, col, err) {
            logDebug('JS ERROR: ' + msg + ' at ' + url + ':' + line);
            autoDownloadLog('uncaught JS error');
        };

        function fmtState(el, val) {
            if (!el) return;
            el.textContent = val;
            el.className = 'value' +
                (val === 'connected' || val === 'complete' ? ' ok' :
                 val === 'failed' || val === 'closed' ? ' err' :
                 val === 'checking' || val === 'connecting' ? ' warn' : '');
        }

        // Extract cameraId from ?cameraId= query parameter.
        var cameraId = (function() {
            var params = new URLSearchParams(location.search);
            return params.get('cameraId') || '';
        })();

        if (!cameraId) {
            pill.className = 'failed';
            pill.textContent = 'no camera';
            status.textContent = 'Camera ID required';
            cameraIdErr.style.display = 'block';
            return;
        }

        // WebSocket relay server. Override with ?relay= if needed.
        var relayURL = (function() {
            var params = new URLSearchParams(location.search);
            return params.get('relay') || 'wss://relay-lively-ridge-9520.fly.dev';
        })();

        var ws = null;
        var assignedPeerId = null;
        var statsTimer = null;

        function setPill(state) {
            pill.className = state;
            pill.textContent = state;
        }

        function connect(attempt) {
            retryBtn.style.display = 'none';
            document.getElementById('download-log-btn').style.display = 'inline-block';
            setPill('connecting');
            status.textContent = attempt > 0 ? 'Retrying (' + attempt + ')...' : 'Starting WebRTC...';
            assignedPeerId = null;
            if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
            debugLogLines = [];
            dbg.track.textContent = 'none';
            dbg.bytes.textContent = '0';
            dbg.pkts.textContent = '0';

            if (ws) {
                try { ws.close(); } catch(_) {}
                ws = null;
            }

            // Watchdog: auto-download log if still not connected after 45s
            var watchdogTimer = setTimeout(function() {
                if (pill.textContent !== 'connected') {
                    logDebug('WATCHDOG: still not connected after 45s');
                    autoDownloadLog('connection timeout (45s)');
                }
            }, 45000);

            var pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.relay.metered.ca:80' },
                    { urls: 'turn:global.relay.metered.ca:80', username: '0210aae87166e20a16a25201', credential: '0fKR0dfpZnnEWhjm' },
                    { urls: 'turn:global.relay.metered.ca:80?transport=tcp', username: '0210aae87166e20a16a25201', credential: '0fKR0dfpZnnEWhjm' },
                    { urls: 'turn:global.relay.metered.ca:443', username: '0210aae87166e20a16a25201', credential: '0fKR0dfpZnnEWhjm' },
                    { urls: 'turns:global.relay.metered.ca:443?transport=tcp', username: '0210aae87166e20a16a25201', credential: '0fKR0dfpZnnEWhjm' },
                ]
            });

            pc.addTransceiver('video', { direction: 'recvonly' });

            pc.ontrack = function(evt) {
                logDebug('ontrack: kind=' + evt.track.kind + ' id=' + evt.track.id + ' label=' + evt.track.label);
                if (evt.track.kind === 'video') {
                    video.srcObject = evt.streams[0] || new MediaStream([evt.track]);
                    dbg.track.textContent = evt.track.id;
                    setPill('connected');
                    status.textContent = 'Connected — receiving video';
                }
            };

            pc.onicecandidate = function(evt) {
                if (!evt.candidate || !assignedPeerId || !ws) return;
                logDebug('local ICE candidate: ' + evt.candidate.candidate.substring(0, 60) + '...');
                ws.send(JSON.stringify({
                    type: 'ice',
                    peerId: assignedPeerId,
                    candidate: evt.candidate.candidate,
                    sdpMid: evt.candidate.sdpMid,
                    sdpMLineIndex: evt.candidate.sdpMLineIndex
                }));
            };

            pc.onconnectionstatechange = function() {
                var s = pc.connectionState;
                logDebug('pc.connectionState -> ' + s);
                fmtState(dbg.pc, s);
                if (s === 'connected') {
                    clearTimeout(watchdogTimer);
                    setPill('connected');
                    status.textContent = 'Connected';
                } else if (s === 'failed' || s === 'disconnected') {
                    clearTimeout(watchdogTimer);
                    setPill('failed');
                    pc.close();
                    if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
                    if (attempt < MAX_RETRIES) {
                        var delay = Math.pow(2, attempt) * 1000;
                        status.textContent = 'Reconnecting in ' + (delay/1000) + 's...';
                        setTimeout(function() { connect(attempt + 1); }, delay);
                    } else {
                        status.textContent = 'Connection failed after ' + MAX_RETRIES + ' attempts.';
                        retryBtn.style.display = 'inline-block';
                        autoDownloadLog('pc state ' + s + ' after max retries');
                    }
                }
            };

            pc.oniceconnectionstatechange = function() {
                var s = pc.iceConnectionState;
                logDebug('pc.iceConnectionState -> ' + s);
                fmtState(dbg.ice, s);
            };

            pc.onsignalingstatechange = function() {
                logDebug('pc.signalingState -> ' + pc.signalingState);
                fmtState(dbg.sig, pc.signalingState);
            };

            // Periodic stats polling
            statsTimer = setInterval(function() {
                if (pc.connectionState !== 'connected' && pc.connectionState !== 'connecting') {
                    return;
                }
                pc.getStats().then(function(report) {
                    var bytes = 0, pkts = 0;
                    report.forEach(function(r) {
                        if (r.type === 'inbound-rtp' && r.kind === 'video') {
                            bytes += (r.bytesReceived || 0);
                            pkts  += (r.packetsReceived || 0);
                        }
                    });
                    dbg.bytes.textContent = bytes;
                    dbg.pkts.textContent = pkts;
                    if (bytes === 0 && pc.connectionState === 'connected') {
                        logDebug('STATS WARN: connected but 0 bytes received');
                    }
                });
            }, 2000);

            // Open WebSocket to relay.
            var socketUrl = relayURL + '/?role=viewer&cameraId=' + encodeURIComponent(cameraId);
            ws = new WebSocket(socketUrl);

            ws.onopen = function() {
                status.textContent = 'WebSocket open; creating offer...';
                pc.createOffer()
                    .then(function(offer) { return pc.setLocalDescription(offer); })
                    .then(function() {
                        ws.send(JSON.stringify({
                            type: 'offer',
                            peerId: 'viewer-' + Math.random().toString(36).slice(2, 10),
                            sdp: pc.localDescription.sdp
                        }));
                        status.textContent = 'Offer sent; waiting for answer...';
                    })
                    .catch(function(e) {
                        console.error('Offer error:', e);
                        setPill('failed');
                        status.textContent = 'Offer error: ' + e.message;
                    });
            };

            ws.onmessage = function(evt) {
                var msg;
                try { msg = JSON.parse(evt.data); } catch(e) { return; }

                if (msg.type === 'answer' && msg.sdp) {
                    assignedPeerId = msg.peerId;
                    logDebug('answer received from ' + msg.peerId + ', SDP len=' + msg.sdp.length);
                    pc.setRemoteDescription({ type: 'answer', sdp: msg.sdp })
                        .then(function() {
                            status.textContent = 'Answer received; ICE connecting...';
                        })
                        .catch(function(e) {
                            console.error('setRemoteDescription error:', e);
                        });
                } else if (msg.type === 'ice' && msg.candidate) {
                    logDebug('remote ICE candidate: ' + msg.candidate.substring(0, 60) + '...');
                    pc.addIceCandidate(new RTCIceCandidate({
                        candidate: msg.candidate,
                        sdpMid: msg.sdpMid || '0',
                        sdpMLineIndex: msg.sdpMLineIndex || 0
                    })).catch(function(e) { console.warn('addIceCandidate error:', e); });
                }
            };

            var reconnectTimer = null;

            function scheduleReconnect(reason) {
                if (reconnectTimer) return; // already scheduled
                if (attempt < MAX_RETRIES) {
                    var delay = Math.pow(2, attempt) * 1000;
                    status.textContent = reason + '. Reconnecting in ' + (delay/1000) + 's...';
                    setPill('connecting');
                    reconnectTimer = setTimeout(function() { connect(attempt + 1); }, delay);
                } else {
                    setPill('failed');
                    status.textContent = 'Connection failed';
                    retryBtn.style.display = 'inline-block';
                    autoDownloadLog(reason + ' after max retries');
                }
            }

            ws.onerror = function(e) {
                console.error('WebSocket error:', e);
                logDebug('WebSocket error');
                clearTimeout(watchdogTimer);
                pc.close();
                if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
                scheduleReconnect('Relay error');
            };

            ws.onclose = function(e) {
                clearTimeout(watchdogTimer);
                if (pc.connectionState === 'connected') {
                    logDebug('WebSocket closed while PC connected — closing PC and reconnecting');
                    pc.close();
                }
                if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
                scheduleReconnect('Relay closed');
            };
        }

        connect(0);
    })();
    </script>
</body>
</html>
